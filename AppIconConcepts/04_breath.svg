<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1230"/>
      <stop offset="100%" stop-color="#2A1F4A"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#80CCC7"/>
      <stop offset="50%" stop-color="#BFB3FA"/>
      <stop offset="100%" stop-color="#FAC7EB"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="80%" stop-color="#FAC7EB"/>
      <stop offset="100%" stop-color="#FAC7EB" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Soft glow behind the wave -->
  <path d="M 140 520 Q 360 280 512 512 T 884 504"
        stroke="#BFB3FA" stroke-opacity="0.35" stroke-width="80"
        stroke-linecap="round" fill="none" filter="url(#bloom)"/>

  <!-- Main breath stroke -->
  <path d="M 140 520 Q 360 280 512 512 T 884 504"
        stroke="url(#wave)" stroke-width="40"
        stroke-linecap="round" fill="none"/>

  <!-- Beginning dot -->
  <circle cx="140" cy="520" r="34" fill="url(#dot)"/>

  <!-- Ending bloom (the breath landing) -->
  <circle cx="884" cy="504" r="100" fill="url(#dot)" opacity="0.85"/>
  <circle cx="884" cy="504" r="40" fill="#FFFFFF" fill-opacity="0.9"/>
</svg>
