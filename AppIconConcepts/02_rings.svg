<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1230"/>
      <stop offset="100%" stop-color="#2A1F4A"/>
    </linearGradient>
    <radialGradient id="warm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FAC7EB"/>
      <stop offset="55%" stop-color="#F99E80"/>
      <stop offset="100%" stop-color="#F5C772"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Soft warm glow behind center -->
  <circle cx="512" cy="512" r="220" fill="#F99E80" fill-opacity="0.35" filter="url(#glow)"/>

  <!-- Concentric breath rings, fading outward -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#F99E80" stroke-opacity="0.10" stroke-width="3"/>
  <circle cx="512" cy="512" r="330" fill="none" stroke="#F99E80" stroke-opacity="0.20" stroke-width="4"/>
  <circle cx="512" cy="512" r="245" fill="none" stroke="#F5C772" stroke-opacity="0.40" stroke-width="5"/>
  <circle cx="512" cy="512" r="170" fill="none" stroke="#FAC7EB" stroke-opacity="0.65" stroke-width="6"/>

  <!-- Solid warm core -->
  <circle cx="512" cy="512" r="110" fill="url(#warm)"/>

  <!-- Inner highlight -->
  <circle cx="490" cy="490" r="30" fill="#FFFFFF" fill-opacity="0.55"/>
</svg>
