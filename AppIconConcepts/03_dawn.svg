<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0E1230"/>
      <stop offset="55%" stop-color="#2A1F4A"/>
      <stop offset="100%" stop-color="#5B3A6A"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAC7EB"/>
      <stop offset="40%" stop-color="#F99E80"/>
      <stop offset="100%" stop-color="#F5C772"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#F99E80" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#F5C772" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#F5C772" stop-opacity="0"/>
    </radialGradient>
    <filter id="softer" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1024" height="1024" fill="url(#sky)"/>

  <!-- Distant glow around the horizon -->
  <ellipse cx="512" cy="700" rx="520" ry="380" fill="url(#sunGlow)" filter="url(#softer)"/>

  <!-- Sun (rising crescent) -->
  <circle cx="512" cy="700" r="260" fill="url(#sun)"/>

  <!-- Horizon overlay to clip lower half — creates the "rising" feel -->
  <rect x="0" y="780" width="1024" height="300" fill="url(#sky)" opacity="0.55"/>

  <!-- Soft horizon line -->
  <line x1="80" y1="780" x2="944" y2="780" stroke="#FAC7EB" stroke-opacity="0.30" stroke-width="2"/>
</svg>
